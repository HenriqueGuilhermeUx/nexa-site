<!DOCTYPE html>
<html lang="pt-BR"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Entrar | Nexa</title><script src="https://cdn.tailwindcss.com"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>body{font-family:'Inter',system-ui,sans-serif}.gradient-bg{background:linear-gradient(135deg,#0F172A 0%,#1E293B 100%)}.cta-glow{box-shadow:0 0 40px rgba(99,102,241,.35)}</style>
<script>const API_URL='https://nexa-backend-p2u0.onrender.com/api/v1';</script></head>
<body class="gradient-bg text-white min-h-screen">
  <div class="min-h-screen flex items-center justify-center px-4">
    <form id="loginForm" class="w-full max-w-md bg-slate-900/90 border border-white/10 p-8 rounded-2xl shadow-2xl">
      <a href="/" class="inline-flex items-center gap-3 mb-8"><span class="w-10 h-10 bg-indigo-500 rounded-xl flex items-center justify-center font-bold text-xl">N</span><span class="text-xl font-bold">Nexa</span></a>
      <h1 class="text-3xl font-extrabold mb-2">Entrar</h1>
      <p class="text-slate-400 mb-6">Acesse sua experiência Pix/USDC.</p>
      <label class="block text-sm text-slate-300 mb-2">E-mail</label>
      <input id="email" type="email" required class="w-full mb-4 p-3 rounded-lg bg-slate-800 border border-white/10 outline-none focus:border-indigo-500" placeholder="voce@email.com">
      <label class="block text-sm text-slate-300 mb-2">Senha</label>
      <input id="password" type="password" required class="w-full mb-6 p-3 rounded-lg bg-slate-800 border border-white/10 outline-none focus:border-indigo-500" placeholder="Sua senha">
      <button id="submitBtn" class="w-full bg-indigo-500 hover:bg-indigo-600 p-3 rounded-lg font-bold cta-glow">Entrar</button>
      <p id="msg" class="mt-4 text-sm text-center"></p>
      <p class="mt-6 text-sm text-slate-400 text-center">Ainda não tem conta? <a class='text-indigo-400 hover:text-indigo-300' href='/cadastro'>Criar conta</a></p>
    </form>
  </div>
<script>
document.getElementById('loginForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const msg=document.getElementById('msg'); const btn=document.getElementById('submitBtn');
  msg.textContent='Entrando...'; msg.className='mt-4 text-sm text-center text-slate-300'; btn.disabled=true;
  try {
    const res=await fetch(API_URL+'/auth/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email:email.value,password:password.value})});
    const data=await res.json().catch(()=>({}));
    if(!res.ok) throw new Error(data.message || 'Não foi possível entrar');
    localStorage.setItem('nexa_access_token', data.accessToken);
    localStorage.setItem('nexa_refresh_token', data.refreshToken);
    localStorage.setItem('nexa_user', JSON.stringify(data.user));
    window.location.href='/app.html';
  } catch(err) {
    msg.textContent=err.message; msg.className='mt-4 text-sm text-center text-red-400'; btn.disabled=false;
  }
});
</script></body></html>
