name: Update official Nexa contact email

on:
  workflow_dispatch:
  push:
    paths:
      - 'scripts/update_contact_email.py'
      - '.github/workflows/update-contact-email.yml'

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Replace old contact email
        run: python3 scripts/update_contact_email.py

      - name: Commit updated pages
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add '*.html'

          if git diff --cached --quiet; then
            echo "Contact email already updated."
            exit 0
          fi

          git commit -m "Update official Nexa contact email"
          git push
